name: ewaste_collector
description: E-Waste Collector mobile application for responsible e-waste disposal

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Supabase
  supabase_flutter: ^2.5.5
  
  # HTTP Requests
  http: ^1.1.0
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Path Provider
  path_provider: ^2.1.1
  
  # Shared Preferences
  shared_preferences: ^2.2.2
  
  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
